<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コイン仕入れDB</title>
<style>
/* ===== 既存スタイル (変更不可) ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 8px; }
.header { text-align: center; padding: 12px 0; border-bottom: 1px solid #333; margin-bottom: 12px; }
.header h1 { font-size: 18px; color: #ffd700; }
.header .meta { font-size: 11px; color: #888; margin-top: 4px; }
.search-box { display: flex; gap: 8px; margin-bottom: 12px; }
.search-box input { flex: 1; padding: 10px; border: 1px solid #444; border-radius: 8px; background: #16213e; color: #fff; font-size: 16px; }
.search-box input::placeholder { color: #666; }
.search-box button { padding: 10px 16px; border: none; border-radius: 8px; background: #ffd700; color: #000; font-weight: bold; font-size: 14px; cursor: pointer; }

.filter-section { background: #16213e; border-radius: 10px; padding: 10px; margin-bottom: 12px; border: 1px solid #2a2a4a; }
.filter-section summary { font-size: 13px; color: #ffd700; cursor: pointer; font-weight: bold; }
.filter-group { margin-top: 10px; }
.filter-group-title { font-size: 11px; color: #888; margin-bottom: 6px; }
.filter-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.filter-row input[type="number"] { width: 100px; padding: 6px; border: 1px solid #444; border-radius: 6px; background: #0f3460; color: #fff; font-size: 14px; }
.filter-row select { padding: 6px; border: 1px solid #444; border-radius: 6px; background: #0f3460; color: #fff; font-size: 14px; }
.filter-row span { font-size: 12px; color: #aaa; }

.filters { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.filters button { padding: 6px 12px; border: 1px solid #444; border-radius: 16px; background: transparent; color: #aaa; font-size: 12px; cursor: pointer; }
.filters button.active { background: #ffd700; color: #000; border-color: #ffd700; }

.filter-row2 { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.filter-row2 button { padding: 6px 12px; border: 1px solid #444; border-radius: 16px; background: transparent; color: #aaa; font-size: 12px; cursor: pointer; }
.filter-row2 button.active { border-color: #60a5fa; color: #60a5fa; }
.filter-row2 button.active-ancient { background: #7f1d1d; border-color: #f87171; color: #fca5a5; }

.count { font-size: 12px; color: #888; margin-bottom: 8px; }
.card { background: #16213e; border-radius: 12px; margin-bottom: 12px; overflow: hidden; border: 1px solid #2a2a4a; }
.card-header { display: flex; align-items: center; padding: 10px; gap: 10px; cursor: pointer; }
.card-header img { width: 60px; height: 80px; object-fit: cover; border-radius: 6px; background: #333; }
.card-header .info { flex: 1; }
.card-header .info .grader { font-size: 11px; color: #ffd700; font-weight: bold; }
.card-header .info .title { font-size: 13px; margin-top: 2px; }
.card-header .info .grade { font-size: 11px; color: #aaa; margin-top: 2px; }
.card-header .price { text-align: right; }
.card-header .price .amount { font-size: 16px; font-weight: bold; color: #4ade80; }
.card-header .price .label { font-size: 10px; color: #888; }
.card-detail { display: none; padding: 0 10px 10px; }
.card.open .card-detail { display: block; }
.card-detail img.full { width: 48%; max-width: 200px; border-radius: 8px; margin: 8px 1%; display: inline-block; vertical-align: top; }
.card-detail .img-pair { text-align: center; margin: 8px 0; }
.card-detail .img-label { font-size: 10px; color: #888; display: inline-block; width: 48%; text-align: center; }
.section { margin-top: 10px; padding: 8px; background: #0f3460; border-radius: 8px; }
.section-title { font-size: 12px; color: #ffd700; font-weight: bold; margin-bottom: 6px; }
.row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
.row .label { color: #aaa; }
.row .value { font-weight: bold; }
.row .value.gold { color: #ffd700; }
.row .value.silver { color: #c0c0c0; }
.row .value.green { color: #4ade80; }
.row .value.red { color: #f87171; }
.ref-box { margin-top: 8px; padding: 8px; border-radius: 8px; }
.ref1 { background: #1a3a5c; border: 1px solid #2563eb; }
.ref2 { background: #3a1a1a; border: 1px solid #7f1d1d; }
.ref-label { font-size: 11px; font-weight: bold; margin-bottom: 4px; }
.ref1 .ref-label { color: #60a5fa; }
.ref2 .ref-label { color: #fca5a5; }
.ebay-price { font-size: 18px; font-weight: bold; text-align: center; padding: 6px 0; }
.ref1 .ebay-price { color: #60a5fa; }
.ref2 .ebay-price { color: #fca5a5; }
.currency { font-size: 12px; text-align: center; color: #aaa; margin-top: 2px; }
.numista-link { display: inline-block; margin-top: 6px; padding: 4px 8px; background: #2563eb; border-radius: 4px; color: #fff; text-decoration: none; font-size: 11px; }
.alert { margin-top: 6px; padding: 6px; background: #7f1d1d; border-radius: 6px; font-size: 11px; color: #fca5a5; text-align: center; }
.history-item { font-size: 11px; padding: 2px 0; border-bottom: 1px solid #1a1a2e; }

/* ===== 追加スタイル: タブナビ ===== */
.tab-nav { display: flex; margin-bottom: 12px; border-bottom: 2px solid #2a2a4a; }
.tab-btn { flex: 1; padding: 10px 4px; border: none; background: transparent; color: #888; font-size: 13px; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tab-btn.active { color: #ffd700; border-bottom-color: #ffd700; }
.tab-btn:hover:not(.active) { color: #ccc; }
.tab-badge { display: inline-block; background: #dc2626; color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 10px; margin-left: 4px; vertical-align: middle; }

/* ===== 追加スタイル: 共通パネル ===== */
.panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.panel-title { font-size: 15px; font-weight: bold; color: #ffd700; }
.kpi-row { display: flex; gap: 8px; margin-bottom: 14px; }
.kpi-box { flex: 1; background: #16213e; border-radius: 8px; padding: 10px 8px; text-align: center; border: 1px solid #2a2a4a; }
.kpi-num { font-size: 24px; font-weight: bold; color: #ffd700; line-height: 1.1; }
.kpi-lbl { font-size: 10px; color: #888; margin-top: 3px; }
.empty-state { text-align: center; color: #666; padding: 36px 20px; font-size: 14px; }
.loading-state { text-align: center; color: #888; padding: 24px; font-size: 13px; }
.section-lbl { font-size: 12px; color: #ffd700; font-weight: bold; margin: 10px 0 6px; }
.load-more-btn { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 8px; background: transparent; color: #888; font-size: 13px; cursor: pointer; margin-top: 4px; }
.load-more-btn:hover { border-color: #ffd700; color: #ffd700; }
.lot-link { display: inline-block; padding: 5px 12px; background: #1e40af; border-radius: 6px; color: #93c5fd; text-decoration: none; font-size: 12px; margin-bottom: 8px; }

/* ===== 追加スタイル: CEO確認カード ===== */
.cand-card { background: #16213e; border-radius: 10px; margin-bottom: 10px; border: 1px solid #2a2a4a; overflow: hidden; }
.cand-top { padding: 12px; }
.cand-title { font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 6px; line-height: 1.4; }
.cand-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
.c-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
.tag-ebay { background: #1d4ed8; color: #93c5fd; }
.tag-heritage { background: #6d28d9; color: #c4b5fd; }
.tag-spink { background: #065f46; color: #6ee7b7; }
.tag-other { background: #374151; color: #9ca3af; }
.c-score { font-size: 15px; font-weight: bold; }
.score-hi { color: #4ade80; }
.score-md { color: #fbbf24; }
.score-lo { color: #f87171; }
.c-limit { font-size: 13px; color: #60a5fa; font-weight: bold; }
.c-deadline { font-size: 11px; }
.deadline-urgent { color: #f87171; font-weight: bold; }
.deadline-near { color: #fbbf24; }
.deadline-normal { color: #888; }
.reason-toggle { background: none; border: 1px solid #333; border-radius: 6px; color: #888; font-size: 12px; padding: 5px 10px; cursor: pointer; width: 100%; text-align: left; }
.reason-toggle:hover { border-color: #888; color: #ccc; }
.cand-detail { display: none; padding: 12px; border-top: 1px solid #2a2a4a; background: #0d1525; }
.cand-card.open .cand-detail { display: block; }
.reason-text { background: #1e293b; border-radius: 6px; padding: 10px; font-size: 12px; color: #cbd5e1; line-height: 1.7; margin-bottom: 10px; white-space: pre-wrap; word-break: break-all; }
.action-row { display: flex; gap: 8px; margin-bottom: 6px; }
.btn-approve { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #ffd700; color: #000; font-size: 14px; font-weight: bold; cursor: pointer; }
.btn-approve:hover { background: #f59e0b; }
.btn-approve:disabled { background: #555; color: #888; cursor: default; }
.btn-ng { flex: 1; padding: 12px; border: 1px solid #7f1d1d; border-radius: 8px; background: #1e1010; color: #fca5a5; font-size: 14px; font-weight: bold; cursor: pointer; }
.btn-ng:hover { background: #7f1d1d; }
.ng-area { display: none; margin-top: 6px; }
.ng-area textarea { width: 100%; padding: 8px; border: 1px solid #444; border-radius: 6px; background: #1e293b; color: #fff; font-size: 12px; resize: vertical; min-height: 56px; }
.ng-submit { margin-top: 6px; width: 100%; padding: 10px; border: none; border-radius: 6px; background: #7f1d1d; color: #fca5a5; font-weight: bold; cursor: pointer; font-size: 13px; }
.ng-submit:hover { background: #991b1b; }
.ng-submit:disabled { background: #333; color: #666; cursor: default; }

/* ===== 追加スタイル: 入札予定カード ===== */
.urgent-counter { background: #dc2626; color: #fff; font-size: 12px; padding: 4px 12px; border-radius: 10px; font-weight: bold; }
.bid-card { background: #16213e; border-radius: 10px; margin-bottom: 10px; border: 1px solid #2a2a4a; overflow: hidden; }
.bid-card-top { padding: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.bid-card-left { flex: 1; min-width: 0; }
.bid-card-title { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bid-card-meta { font-size: 11px; color: #888; }
.bid-card-right { text-align: right; flex-shrink: 0; }
.bid-amount-disp { font-size: 15px; font-weight: bold; color: #4ade80; }
.bid-amount-null { font-size: 12px; color: #555; }
.result-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-top: 3px; }
.r-scheduled { background: #1d4ed8; color: #93c5fd; }
.r-win { background: #166534; color: #86efac; }
.r-lose { background: #7f1d1d; color: #fca5a5; }
.r-cancelled { background: #374151; color: #9ca3af; }
.urgent-dot { color: #f87171; }
.bid-detail { display: none; padding: 12px; border-top: 1px solid #2a2a4a; background: #0d1525; }
.bid-card.open .bid-detail { display: block; }
.form-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.form-lbl { font-size: 12px; color: #aaa; width: 110px; flex-shrink: 0; }
.form-input { flex: 1; padding: 8px 10px; border: 1px solid #444; border-radius: 6px; background: #1e293b; color: #fff; font-size: 14px; min-width: 0; }
.form-input:focus { outline: none; border-color: #ffd700; }
.form-select { flex: 1; padding: 8px 10px; border: 1px solid #444; border-radius: 6px; background: #1e293b; color: #fff; font-size: 14px; }
.jpy-hint { font-size: 12px; color: #60a5fa; flex-shrink: 0; }
.drop-zone { border: 2px dashed #333; border-radius: 8px; padding: 16px; text-align: center; color: #555; font-size: 12px; cursor: pointer; transition: border-color 0.2s, color 0.2s; margin-bottom: 4px; }
.drop-zone.dragover { border-color: #ffd700; color: #ffd700; }
.drop-zone .preview-img { max-width: 100%; border-radius: 6px; margin-top: 8px; display: block; margin-left: auto; margin-right: auto; }
.btn-save-bid { width: 100%; padding: 13px; border: none; border-radius: 8px; background: #ffd700; color: #000; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; }
.btn-save-bid:hover { background: #f59e0b; }
.btn-save-bid:disabled { background: #555; color: #888; cursor: default; }
.new-bid-toggle-btn { width: 100%; padding: 10px; border: 1px dashed #444; border-radius: 8px; background: transparent; color: #888; font-size: 13px; cursor: pointer; margin-bottom: 12px; }
.new-bid-toggle-btn:hover { border-color: #ffd700; color: #ffd700; }
.new-bid-form { background: #16213e; border-radius: 10px; padding: 12px; margin-bottom: 14px; border: 1px solid #2a2a4a; display: none; }

/* ===== CEO確認カード 追加情報スタイル ===== */
.ceo-price-grid { display: flex; gap: 5px; margin: 8px 0; }
.ceo-pc { flex: 1; min-width: 0; background: #0a1a2e; border-radius: 6px; padding: 6px 4px; text-align: center; border: 1px solid #1e3050; }
.ceo-pc .c-lbl { font-size: 9px; color: #6b7280; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ceo-pc .c-val { font-size: 12px; font-weight: bold; line-height: 1.2; }
.ceo-ref-grid { display: flex; gap: 5px; margin: 0 0 8px; }
.ceo-rc { flex: 1; min-width: 0; background: #0a1f3c; border: 1px solid #1e3a6e; border-radius: 6px; padding: 5px 4px; text-align: center; }
.ceo-rc .c-lbl { font-size: 9px; color: #6b7280; margin-bottom: 1px; }
.ceo-rc .c-val { font-size: 12px; font-weight: bold; color: #60a5fa; }
.ceo-imgs { display: flex; gap: 8px; margin: 6px 0; }
.ceo-imgs .ceo-iw { flex: 1; text-align: center; }
.ceo-imgs img { width: 100%; max-height: 110px; object-fit: contain; border-radius: 6px; background: #0a0a1a; }
.ceo-imgs .ceo-il { font-size: 10px; color: #555; margin-top: 2px; display: block; }
.ceo-hist { background: #0a1520; border-radius: 6px; padding: 7px 8px; margin: 6px 0; border: 1px solid #1a2a3a; }
.ceo-hist-ttl { font-size: 11px; color: #ffd700; font-weight: bold; margin-bottom: 5px; }
.ceo-hr { display: flex; justify-content: space-between; align-items: center; font-size: 11px; padding: 3px 0; border-bottom: 1px solid #1a2535; }
.ceo-hr:last-child { border-bottom: none; }
.ceo-hr .h-d { color: #6b7280; font-size: 10px; }
.ceo-hr .h-p { color: #4ade80; font-weight: bold; }
.ceo-hr .h-g { color: #9ca3af; font-size: 10px; }
.ceo-hr .h-t { color: #d1d5db; font-size: 10px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; margin-bottom: 2px; }
.ceo-hr .h-ip { color: #6b7280; font-size: 10px; }
.ceo-hr { flex-wrap: wrap; }
.vg { color: #4ade80; } .vr { color: #f87171; } .vy { color: #ffd700; } .vb { color: #60a5fa; } .vw { color: #e2e8f0; }
/* ── 画像拡大モーダル ── */
.ceo-imgs .ceo-iw { cursor: pointer; }
.ceo-imgs .ceo-iw:hover img { opacity: 0.82; outline: 2px solid #ffd700; border-radius: 6px; }
#img-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.88); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
#img-modal img { max-width: 92vw; max-height: 72vh; object-fit: contain; border-radius: 10px; border: 2px solid #444; }
#img-modal .im-lbl { color: #ffd700; font-size: 14px; font-weight: bold; margin-top: 12px; }
#img-modal .im-close { margin-top: 14px; padding: 8px 32px; background: #222; color: #fff; border: 1px solid #555; border-radius: 8px; font-size: 15px; cursor: pointer; }
#img-modal .im-close:hover { background: #333; }
</style>
</head>
<body>

<!-- ── 画像拡大モーダル ── -->
<div id="img-modal" style="display:none" onclick="closeImgModal()">
  <img id="img-modal-img" src="" alt="">
  <span class="im-lbl" id="img-modal-lbl"></span>
  <button class="im-close" onclick="event.stopPropagation(); closeImgModal()">✕ 閉じる</button>
</div>

<div class="header">
  <h1>コイン仕入れDB</h1>
  <div class="meta" id="meta"></div>
</div>

<!-- タブナビ (追加) -->
<div class="tab-nav">
  <button class="tab-btn" id="tab-btn-db" onclick="switchTab('db')">📊 相場DB</button>
  <button class="tab-btn" id="tab-btn-mkt" onclick="switchTab('mkt')">📋 マーケ確認<span class="tab-badge" id="mkt-count-badge" style="display:none">0</span></button>
  <button class="tab-btn active" id="tab-btn-ceo" onclick="switchTab('ceo')">✅ CEO確認<span class="tab-badge" id="ceo-count-badge" style="display:none">0</span></button>
  <button class="tab-btn" id="tab-btn-bid" onclick="switchTab('bid')">🎯 入札予定<span class="tab-badge" id="bid-urgent-badge" style="display:none">0</span></button>
</div>

<!-- ① 相場DBパネル (既存コンテンツをラップ、デフォルト非表示) -->
<div id="db-panel" style="display:none">

<div class="search-box" style="margin-bottom:6px;">
  <input type="text" id="mgmtNo" placeholder="管理番号(6桁)" style="width:120px;text-align:center;flex:none;" maxlength="6" inputmode="numeric">
  <button onclick="doMgmtSearch()" style="flex:none;">番号検索</button>
  <input type="text" id="search" placeholder="スラブテキスト / 国名 / 年号" style="flex:1;">
  <button onclick="doSearch()">検索</button>
</div>

<details class="filter-section" id="filterPanel">
  <summary>フィルター</summary>

  <div class="filter-group">
    <div class="filter-group-title">価格帯を指定する</div>
    <div class="filter-row">
      <input type="number" id="priceMin" placeholder="下限" step="10000">
      <span>円 ～</span>
      <input type="number" id="priceMax" placeholder="上限" step="10000">
      <span>円</span>
    </div>
  </div>

  <div class="filter-group">
    <div class="filter-group-title">期間を指定する</div>
    <div class="filter-row">
      <span>開始月</span>
      <select id="startYear"></select><span>年</span>
      <select id="startMonth"></select><span>月</span>
    </div>
    <div class="filter-row">
      <span>終了月</span>
      <select id="endYear"></select><span>年</span>
      <select id="endMonth"></select><span>月</span>
    </div>
  </div>

  <div class="filter-group">
    <div class="filter-group-title">素材</div>
    <div class="filters" id="matFilters">
      <button class="active" onclick="filterMat(this,'all')">全て</button>
      <button onclick="filterMat(this,'gold')">Gold</button>
      <button onclick="filterMat(this,'silver')">Silver</button>
      <button onclick="filterMat(this,'platinum')">Platinum</button>
    </div>
  </div>

  <div class="filter-group">
    <div class="filter-group-title">鑑定会社</div>
    <div class="filter-row2" id="graderFilters">
      <button class="active" onclick="filterGrader(this,'all')">全て</button>
      <button onclick="filterGrader(this,'NGC')">NGC</button>
      <button onclick="filterGrader(this,'PCGS')">PCGS</button>
    </div>
  </div>

  <div class="filter-group">
    <div class="filter-group-title">その他</div>
    <div class="filter-row2" id="otherFilters">
      <button onclick="toggleAncient(this)">古代コインのみ</button>
    </div>
  </div>

  <div style="margin-top:12px; text-align:center;">
    <button onclick="renderAll()" style="padding:10px 40px; border:none; border-radius:8px; background:#ffd700; color:#000; font-weight:bold; font-size:14px; cursor:pointer;">この条件で検索</button>
  </div>
</details>

<div class="count" id="count"></div>
<div id="results"></div>

</div><!-- /#db-panel -->


<!-- ② CEO確認パネル (デフォルト表示) -->
<div id="ceo-panel">

  <div class="panel-header">
    <div class="panel-title">🔍 CEO確認</div>
    <button onclick="loadCeoPanel(0, true)" style="background:none;border:1px solid #444;border-radius:6px;color:#888;padding:4px 10px;font-size:12px;cursor:pointer;">↺ 更新</button>
  </div>

  <div class="kpi-row">
    <div class="kpi-box"><div class="kpi-num" id="ceo-kpi-pending">-</div><div class="kpi-lbl">未判断</div></div>
    <div class="kpi-box"><div class="kpi-num" id="ceo-kpi-ok" style="color:#4ade80;">-</div><div class="kpi-lbl">OK</div></div>
    <div class="kpi-box"><div class="kpi-num" id="ceo-kpi-ng" style="color:#f87171;">-</div><div class="kpi-lbl">NG</div></div>
  </div>
  <div class="kpi-row">
    <div class="kpi-box"><div class="kpi-num" id="ceo-kpi-hold" style="color:#fbbf24;">-</div><div class="kpi-lbl">HOLD</div></div>

<script>
/* ===== 既存コード (変更不可) ===== */
let DATA = null;
let currentFilter = 'all';
let currentGrader = 'all';
let ancientOnly = false;

function initDateSelectors() {
  const sy = document.getElementById('startYear');
  const ey = document.getElementById('endYear');
  const sm = document.getElementById('startMonth');
  const em = document.getElementById('endMonth');
  for (let y = 2025; y <= 2026; y++) {
    sy.innerHTML += `<option value="${y}" ${y===2025?'selected':''}>${y}</option>`;
    ey.innerHTML += `<option value="${y}" ${y===2026?'selected':''}>${y}</option>`;
  }
  for (let m = 1; m <= 12; m++) {
    sm.innerHTML += `<option value="${m}" ${m===1?'selected':''}>${m}</option>`;
    em.innerHTML += `<option value="${m}" ${m===12?'selected':''}>${m}</option>`;
  }
  // フィルターは検索ボタン押下時のみ反映
}

async function loadData() {
  const resp = await fetch('data.json');
  DATA = await resp.json();
  const r = DATA.rates;
  document.getElementById('meta').innerHTML =
    `更新: ${DATA.updated} | Gold: ${fmt(r.gold_jpy_per_g)}円/g | Silver: ${Number(r.silver_jpy_per_g).toFixed(1)}円/g | USD: ${r.usd_jpy_calc} | GBP: ${r.gbp_jpy_calc}`;
  initDateSelectors();
  renderAll();
}

function fmt(n) { return n ? Number(n).toLocaleString('ja-JP', {maximumFractionDigits: 0}) : '0'; }

function calcRef(sellingPrice) {
  const sellNet = Math.round(sellingPrice * 0.9);
  const costLimit = Math.round(sellNet * 0.85);
  const ebayJpy = Math.round((costLimit - 2000 - 750) / 1.1);
  const gross = sellNet - costLimit;
  const grossRate = sellNet > 0 ? (gross / sellNet * 100).toFixed(1) : '0';
  return { sellNet, costLimit, ebayJpy, gross, grossRate };
}

function getSoldDate(c) {
  let ph = c.price_history;
  if (typeof ph === 'string') ph = JSON.parse(ph);
  if (!ph || !ph.length) return '';
  return ph[ph.length - 1].date || '';
}

const PAGE_SIZE = 100;
let _filteredCoins = [];
let _shownCount = 0;

function renderAll() {
  const q = document.getElementById('search').value.toLowerCase();
  const priceMin = parseInt(document.getElementById('priceMin').value) || 0;
  const priceMax = parseInt(document.getElementById('priceMax').value) || Infinity;
  const startY = parseInt(document.getElementById('startYear').value);
  const startM = parseInt(document.getElementById('startMonth').value);
  const endY = parseInt(document.getElementById('endYear').value);
  const endM = parseInt(document.getElementById('endMonth').value);
  const startDate = `${startY}-${String(startM).padStart(2,'0')}-01`;
  const endDate = `${endY}-${String(endM).padStart(2,'0')}-31`;

  _filteredCoins = DATA.coins.filter(c => {
    if (currentFilter !== 'all' && (c.material || '').toLowerCase() !== currentFilter) return false;
    if (currentGrader !== 'all' && (c.grader || '') !== currentGrader) return false;
    if (ancientOnly && !c.is_ancient) return false;
    const price = c.price_jpy || 0;
    if (price < priceMin || price > priceMax) return false;
    const soldDate = getSoldDate(c);
    if (soldDate && (soldDate < startDate || soldDate > endDate)) return false;
    if (q) {
      const text = [c.slab_line1, c.slab_line2, c.slab_line3, c.grader, c.grade, c.coin_id, c.management_no].join(' ').toLowerCase();
      if (!text.includes(q)) return false;
    }
    return true;
  });

  _filteredCoins.sort((a, b) => (b.price_jpy || 0) - (a.price_jpy || 0));
  _shownCount = 0;
  document.getElementById('results').innerHTML = '';
  document.getElementById('count').textContent = `${_filteredCoins.length}件`;
  _renderNextPage();
}

function _renderNextPage() {
  const batch = _filteredCoins.slice(_shownCount, _shownCount + PAGE_SIZE);
  if (!batch.length) { _updateMoreBtn(); return; }
  const html = batch.map(c => renderCard(c)).join('');
  document.getElementById('results').insertAdjacentHTML('beforeend', html);
  _shownCount += batch.length;
  _updateMoreBtn();
}

function _updateMoreBtn() {
  let btn = document.getElementById('loadMoreBtn');
  const remaining = _filteredCoins.length - _shownCount;
  if (remaining > 0) {
    if (!btn) {
      btn = document.createElement('div');
      btn.id = 'loadMoreBtn';
      btn.style.cssText = 'text-align:center;padding:16px;';
      btn.innerHTML = `<button onclick="_renderNextPage()" style="background:#1e3a5f;color:#fff;border:none;padding:10px 32px;border-radius:8px;font-size:14px;cursor:pointer;">もっと見る（残り<span id="remainCount">${remaining}</span>件）</button>`;
      document.getElementById('results').after(btn);
    } else {
      document.getElementById('remainCount').textContent = remaining;
      btn.style.display = '';
    }
  } else {
    if (btn) btn.style.display = 'none';
  }
}

function renderCard(c) {
  const mat = (c.material || '').toLowerCase();
  const matClass = mat === 'gold' ? 'gold' : mat === 'silver' ? 'silver' : '';
  const purity = parseFloat(c.purity || 0);
  const weight = parseFloat(c.weight_g || 0);
  const rates = DATA.rates;
  const currentRate = mat === 'gold' ? rates.gold_jpy_per_g : mat === 'silver' ? rates.silver_jpy_per_g : mat === 'platinum' ? rates.platinum_jpy_per_g : 0;
  const metalCurrent = Math.round(parseFloat(currentRate) * weight * purity);

  let ph = c.price_history;
  if (typeof ph === 'string') ph = JSON.parse(ph);
  if (!ph) ph = [{price: c.price_jpy || 0, date: '', bids: 0, init_price: 0}];

  const prices = ph.map(p => p.price).sort((a,b) => a-b);
  const n = prices.length;
  let median, pattern;
  if (n >= 5) { const t = prices.slice(1,-1); median = t[Math.floor(t.length/2)]; pattern = `P3: ${n}件 上下カット`; }
  else if (n === 4) { const t = prices.slice(1,-1); median = Math.round(t.reduce((a,b)=>a+b,0)/t.length); pattern = 'P4: 4件 上下カット'; }
  else if (n === 3) { median = prices[1]; pattern = 'P5-1: 3件 中央値'; }
  else if (n === 2) { median = prices[0]; pattern = 'P5-2: 2件 安い方'; }
  else { median = prices[0]; pattern = 'P5-3: 1件'; }

  const soldRate = c.sold_date_metal_rate || parseFloat(currentRate);
  const metalAtSold = Math.round(soldRate * weight * purity);
  const premium = Math.round(median - metalAtSold);
  const ref1Selling = premium + metalCurrent;
  const ref1 = calcRef(ref1Selling);

  const ref2Price = ph[ph.length - 1].price || 0;
  const ref2Date = ph[ph.length - 1].date || '';
  const ref2 = calcRef(ref2Price);

  const usd = parseFloat(rates.usd_jpy_calc || 150);
  const gbp = parseFloat(rates.gbp_jpy_calc || 200);

  const gap = ref2.ebayJpy > 0 ? Math.abs(ref1.ebayJpy - ref2.ebayJpy) / ref2.ebayJpy * 100 : 0;

  const imgUrl = c.front_img_url || '';
  const backImgUrl = c.back_img_url || '';
  const ancientBadge = c.is_ancient ? '<span style="color:#f87171;font-size:10px;"> [古代]</span>' : '';

  return `
  <div class="card" onclick="this.classList.toggle('open')">
    <div class="card-header">
      <img src="${imgUrl}" alt="" onerror="this.style.display='none'">
      <div class="info">
        <div class="grader"><span style="color:#60a5fa;">#${c.management_no || ''}</span> ${c.grader || ''}${ancientBadge}</div>
        <div class="title">${c.slab_line1 || ''}</div>
        <div class="grade">${c.slab_line2 || ''} | ${c.grade || ''}</div>
      </div>
      <div class="price">
        <div class="label">eBay上限(基準1・2万円)</div>
        <div class="amount">${c.ref1_buy_limit_20k_jpy != null ? fmt(c.ref1_buy_limit_20k_jpy) : fmt(ref1.ebayJpy)}円</div>
        <div class="label">USD${fmt(Math.round((c.ref1_buy_limit_20k_jpy != null ? c.ref1_buy_limit_20k_jpy : ref1.ebayJpy)/usd))} / GBP${fmt(Math.round((c.ref1_buy_limit_20k_jpy != null ? c.ref1_buy_limit_20k_jpy : ref1.ebayJpy)/gbp))}</div>
      </div>
    </div>
    <div class="card-detail">
      <div class="img-pair">
        <img class="full" src="${imgUrl}" alt="表面" loading="lazy" onerror="this.style.display='none'">
        <img class="full" src="${backImgUrl}" alt="裏面" loading="lazy" onerror="this.style.display='none'">
      </div>
      <div class="img-pair">
        <span class="img-label">表面</span>
        <span class="img-label">裏面</span>
      </div>

      ${c.ref1_buy_limit_20k_jpy != null ? `<div class="section" style="margin-top:8px;background:#0d1f3c;">
        <div class="section-title">💴 仕入れ上限（DB確定値）<span onclick="event.stopPropagation();alert('基準1: プレミアム+現在地金で算出\\n基準2: ヤフオク直近落札額で算出\\n\\n▶2万円ライン: eBay仕入価格がここ以下なら利益2万円以上\\n15%ライン: 粗利15%以上確保ライン\\n※送料・関税・ヤフオク手数料込み')" style="color:#60a5fa;font-size:10px;cursor:pointer;margin-left:4px;font-weight:normal;">[?]</span></div>
        <div class="row"><span class="label">▶ 基準1　利益2万円</span><span class="value green" style="font-size:14px;">${fmt(c.ref1_buy_limit_20k_jpy)}円</span></div>
        <div class="row"><span class="label">　 基準1　粗利15%</span><span class="value">${fmt(c.ref1_buy_limit_15pct_jpy)}円</span></div>
        <div class="row" style="margin-top:4px;padding-top:4px;border-top:1px solid #1e2e4a;"><span class="label">　 基準2　利益2万円</span><span class="value" style="color:#fca5a5;">${fmt(c.ref2_buy_limit_20k_jpy)}円</span></div>
        <div class="row"><span class="label">　 基準2　粗利15%</span><span class="value">${fmt(c.ref2_buy_limit_15pct_jpy)}円</span></div>
      </div>` : ''}

      <div class="section">
        <div class="section-title">コイン情報</div>
        <div class="row"><span class="label">素材</span><span class="value ${matClass}">${c.material || ''} (${c.purity || ''}) ${c.weight_g || ''}g</span></div>
        <div class="row"><span class="label">地金(現在)</span><span class="value">${fmt(metalCurrent)}円 (${fmt(currentRate)}円/g)</span></div>
        <div class="row"><span class="label">地金(落札日)</span><span class="value">${fmt(metalAtSold)}円 (${fmt(soldRate)}円/g)</span></div>
        <div class="row"><span class="label">プレミアム</span><span class="value">${fmt(premium)}円</span></div>
        ${c.numista_url ? `<a class="numista-link" href="${c.numista_url}" target="_blank">Numista</a>` : ''}
      </div>

      <div class="section">
        <div class="section-title">価格算定 (${pattern})</div>
        ${ph.map((p,j) => `<div class="history-item">${j+1}. ${fmt(p.price)}円 入札:${p.bids||'?'} 開始:${fmt(p.init_price||0)} (${p.date||''})</div>`).join('')}
      </div>

      <div class="ref-box ref1">
        <div class="ref-label">基準1: プレミアム+現在地金</div>
        <div class="row"><span class="label">販売標準価格</span><span class="value">${fmt(ref1Selling)}円</span></div>
        <div class="row"><span class="label">販売手取り</span><span class="value">${fmt(ref1.sellNet)}円</span></div>
        <div class="row"><span class="label">原価上限(85%)</span><span class="value">${fmt(ref1.costLimit)}円</span></div>
        <div class="ebay-price">${c.ref1_buy_limit_20k_jpy != null ? fmt(c.ref1_buy_limit_20k_jpy) : fmt(ref1.ebayJpy)}円</div>
        <div class="currency">USD${fmt(Math.round((c.ref1_buy_limit_20k_jpy != null ? c.ref1_buy_limit_20k_jpy : ref1.ebayJpy)/usd))} / GBP${fmt(Math.round((c.ref1_buy_limit_20k_jpy != null ? c.ref1_buy_limit_20k_jpy : ref1.ebayJpy)/gbp))}</div>
        <div class="row"><span class="label">eBay仕入上限(送料込)★利益2万円</span><span class="value"></span></div>
        <div class="row"><span class="label" style="color:#777;">　粗利15%ライン</span><span class="value" style="color:#777;font-size:11px;">${fmt(ref1.ebayJpy)}円</span></div>
        <div class="row"><span class="label">想定粗利</span><span class="value green">${fmt(ref1.gross)}円 (${ref1.grossRate}%)</span></div>
      </div>

      <div class="ref-box ref2">
        <div class="ref-label">基準2: ヤフオク実績 (CEO専用)</div>
        <div class="row"><span class="label">直近落札価格</span><span class="value">${fmt(ref2Price)}円 (${ref2Date})</span></div>
        <div class="row"><span class="label">落札日${mat.substring(0,2)}単価</span><span class="value">${fmt(soldRate)}円/g</span></div>
        <div class="row"><span class="label">販売手取り</span><span class="value">${fmt(ref2.sellNet)}円</span></div>
        <div class="row"><span class="label">原価上限(85%)</span><span class="value">${fmt(ref2.costLimit)}円</span></div>
        <div class="ebay-price">${c.ref2_buy_limit_20k_jpy != null ? fmt(c.ref2_buy_limit_20k_jpy) : fmt(ref2.ebayJpy)}円</div>
        <div class="currency">USD${fmt(Math.round((c.ref2_buy_limit_20k_jpy != null ? c.ref2_buy_limit_20k_jpy : ref2.ebayJpy)/usd))} / GBP${fmt(Math.round((c.ref2_buy_limit_20k_jpy != null ? c.ref2_buy_limit_20k_jpy : ref2.ebayJpy)/gbp))}</div>
        <div class="row"><span class="label">eBay仕入上限(送料込)★利益2万円</span><span class="value"></span></div>
        <div class="row"><span class="label" style="color:#777;">　粗利15%ライン</span><span class="value" style="color:#777;font-size:11px;">${fmt(ref2.ebayJpy)}円</span></div>
        <div class="row"><span class="label">想定粗利</span><span class="value green">${fmt(ref2.gross)}円 (${ref2.grossRate}%)</span></div>
      </div>

      ${gap > 30 ? `<div class="alert">基準1-2乖離 ${gap.toFixed(0)}% 要確認</div>` : ''}
    </div>
  </div>`;
}

function doMgmtSearch() {

function _renderVenueCounts(items) {
  const el = document.getElementById('ceo-venue-counts');
  if (!el) return;
  const counts = {};
  items.forEach(i => {
    const h = i.auction_house || (i.source_group === 'WORLD' ? 'OTHER' : 'EBAY');
    counts[h] = (counts[h] || 0) + 1;
  });
  // Sort: EBAY first, then HERITAGE (★優先), then venue priority order
  const order = ['EBAY','HERITAGE','NOBLE','SPINK','NOONANS','STACKS_BOWERS','GREATCOLLECTIONS','SIXBID','CATAWIKI','MA_SHOPS','OTHER'];
  const known = new Set(order);
  const extra = Object.keys(counts).filter(k => !known.has(k)).sort();
  const sorted = [...order, ...extra].filter(k => counts[k]);
  const chips = sorted.map(k => {
    const isHeritage = k === 'HERITAGE';
    const isWorld = k !== 'EBAY';
    const bg  = isHeritage ? '#1c1200' : isWorld ? '#0c1a2e' : '#0d1a0d';
    const col = isHeritage ? '#f59e0b' : isWorld ? '#93c5fd' : '#86efac';
    const brd = isHeritage ? '#d97706' : isWorld ? '#1d4ed8' : '#166534';
    const label = isHeritage ? `★ ${escH(HOUSE_LABEL[k] || k)}` : escH(HOUSE_LABEL[k] || k);
    return `<span style="background:${bg};color:${col};border:1px solid ${brd};border-radius:10px;padding:2px 8px;white-space:nowrap;font-weight:${isHeritage?'bold':'normal'};">
      ${label}: <strong>${counts[k]}</strong>
    </span>`;
  }).join('');
  el.innerHTML = chips || '<span style="color:#6b7280;font-size:11px;">（本日データなし）</span>';
}

async function loadCeoPanel(offset, reset) {
  document.getElementById('ceo-list').innerHTML = '<div class="loading-state">読み込み中...</div>';

  /* KPI 6件並列 */
  try {
    const hdr = { ...SB_HDR, 'Prefer': 'count=exact' };
    const cnt = async (filter) => {
      const r = await fetch(`${SB_URL}/rest/v1/ceo_review_log?${filter}&select=id&limit=1`, { headers: hdr });
      const cr = r.headers.get('content-range');
      return cr ? parseInt(cr.split('/')[1] || 0) : 0;
    };
    const [pCnt, okCnt, ngCnt, holdCnt, blockCnt, resubCnt] = await Promise.all([
      cnt(`marketing_status=eq.MARKETING_APPROVED&ceo_decision=is.null`),
      cnt(`marketing_status=eq.MARKETING_APPROVED&ceo_decision=eq.OK`),
      cnt(`marketing_status=eq.MARKETING_APPROVED&ceo_decision=eq.NG`),
      cnt(`marketing_status=eq.MARKETING_APPROVED&ceo_decision=eq.HOLD`),
      cnt(`marketing_status=eq.MARKETING_APPROVED&duplicate_status=eq.DUPLICATE_BLOCKED`),
      cnt(`marketing_status=eq.MARKETING_APPROVED&duplicate_status=eq.RESUBMITTED&ceo_decision=is.null`),
    ]);
    document.getElementById('ceo-kpi-pending').textContent  = pCnt;
    document.getElementById('ceo-kpi-ok').textContent       = okCnt;
    document.getElementById('ceo-kpi-ng').textContent       = ngCnt;
    document.getElementById('ceo-kpi-hold').textContent     = holdCnt;
    document.getElementById('ceo-kpi-blocked').textContent  = blockCnt;
    document.getElementById('ceo-kpi-resub').textContent    = resubCnt;
    const badge = document.getElementById('ceo-count-badge');
    badge.textContent = pCnt; badge.style.display = pCnt > 0 ? '' : 'none';
  } catch(e) { console.error('CEO KPI:', e); }

  /* 全件取得 (当日分 500件上限) */
  try {
    const cols = 'id,marketplace,source_group,auction_house,item_id,url,title_snapshot,cert_company,cert_number,grade,country,year,denomination,material,bid_count_snapshot,price_snapshot_usd,price_snapshot_jpy,yahoo_ref_price,profit_estimate,db_similarity,db_ref_id,snapshot_score,scan_date,review_bucket,duplicate_status,resubmit_reason,submit_count,ceo_decision,reason_code,reason_text,first_seen_at,comparison_type,yahoo_ref_title,yahoo_ref_price_jpy,yahoo_ref_date,yahoo_ref_grade,cap_bid_limit_jpy,cap_bid_limit_usd,estimated_sell_price_jpy,expected_profit_jpy,expected_roi_pct,cap_judgment,cap_comment,image_url,evidence_status,category,marketing_status,marketing_comment';
    const resp = await fetch(
      `${SB_URL}/rest/v1/ceo_review_log?marketing_status=eq.MARKETING_APPROVED&select=${cols}&limit=500&order=snapshot_score.desc`,
      { headers: SB_HDR }
    );
    _ceoItems = await resp.json();
    if (!Array.isArray(_ceoItems)) _ceoItems = [];
    _renderVenueCounts(_ceoItems);
    renderCeoFiltered();
  } catch(e) {
    console.error('CEO list:', e);
    document.getElementById('ceo-list').innerHTML = '<div class="empty-state" style="color:#f87171;">読み込みエラー。↺ 更新を押してください。</div>';
  }
}

function renderCeoFiltered() {
  let items = [..._ceoItems];
  // --- 判断フィルター ---
  if (_ceoDecisionFilter === 'pending') {
    items = items.filter(i => !i.ceo_decision && i.duplicate_status !== 'DUPLICATE_BLOCKED');
  } else if (_ceoDecisionFilter === 'hold') {
    items = items.filter(i => i.ceo_decision === 'HOLD');
  } else if (_ceoDecisionFilter === 'blocked') {
    items = items.filter(i => i.duplicate_status === 'DUPLICATE_BLOCKED');
  }
  // --- ソースグループフィルター (eBay / 世界オークション) ---
  if (_ceoSourceGroupFilter === 'EBAY') {
    items = items.filter(i => (i.source_group || 'EBAY') === 'EBAY');
  } else if (_ceoSourceGroupFilter === 'WORLD') {
    items = items.filter(i => (i.source_group || 'EBAY') === 'WORLD');
    // 会場別フィルター (世界オークション選択時のみ有効)
    if (_ceoAuctionHouseFilter !== 'all') {
      items = items.filter(i => (i.auction_house || 'OTHER') === _ceoAuctionHouseFilter);
    }
  }
  // --- バケットフィルター ---
  if (_ceoBucketFilter !== 'all') {
    items = items.filter(i => i.review_bucket === _ceoBucketFilter);
  }
  // --- ソート ---
  // 全件表示 → スコア優先（会場横断5分レビュー）
  // 会場指定 → source_group → auction_house → bucket → profit↓ → bids↓
  if (_ceoSourceGroupFilter === 'all') {
    items.sort((a, b) => {
      const sd = (b.snapshot_score || 0) - (a.snapshot_score || 0);
      if (sd !== 0) return sd;
      const bo = (BUCKET_ORDER[a.review_bucket] ?? 9) - (BUCKET_ORDER[b.review_bucket] ?? 9);
      if (bo !== 0) return bo;
      const pd = (b.profit_estimate || 0) - (a.profit_estimate || 0);
      if (pd !== 0) return pd;
      return (b.bid_count_snapshot || 0) - (a.bid_count_snapshot || 0);
    });
  } else {
    items.sort((a, b) => {
      const sg = (SOURCE_ORDER[a.source_group || 'EBAY'] ?? 0) - (SOURCE_ORDER[b.source_group || 'EBAY'] ?? 0);
      if (sg !== 0) return sg;
      const ah = (a.auction_house || 'EBAY').localeCompare(b.auction_house || 'EBAY');
      if (ah !== 0) return ah;
      const bo = (BUCKET_ORDER[a.review_bucket] ?? 9) - (BUCKET_ORDER[b.review_bucket] ?? 9);
      if (bo !== 0) return bo;
      const sd = (b.snapshot_score || 0) - (a.snapshot_score || 0);
      if (sd !== 0) return sd;
      const pd = (b.profit_estimate || 0) - (a.profit_estimate || 0);
      if (pd !== 0) return pd;
      return (b.bid_count_snapshot || 0) - (a.bid_count_snapshot || 0);
    });
  }
  const list = document.getElementById('ceo-list');
  if (!items.length) {
    list.innerHTML = '<div class="empty-state">✅ 該当案件はありません</div>';
    return;
  }
  const sortLabel = _ceoSourceGroupFilter === 'all'
    ? `<div style="font-size:11px;color:#60a5fa;margin-bottom:6px;">📊 スコア順（会場横断）— ${items.length}件</div>`
    : `<div style="font-size:11px;color:#888;margin-bottom:6px;">📋 会場別順 — ${items.length}件</div>`;
  list.innerHTML = sortLabel + items.map((item, idx) => renderCrlCard(item, idx + 1)).join('');
}

async function doCeoOK(uuid, safeId, btn) {
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    const r1 = await fetch(`${SB_URL}/rest/v1/ceo_review_log?id=eq.${encodeURIComponent(uuid)}`, {
      method: 'PATCH',
      headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ ceo_decision: 'OK', reviewed_at: new Date().toISOString(), reviewed_by: 'CEO' })
    });
    if (!r1.ok) throw new Error(`PATCH ceo_review_log: ${r1.status}`);

    /* bid_history に追加 */
    const item = _ceoItems.find(i => i.id === uuid);
    if (item) {
      await fetch(`${SB_URL}/rest/v1/bid_history`, {
        method: 'POST',
        headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          lot_title: item.title_snapshot || '',
          auction_house: item.marketplace || 'eBay',
          lot_url: item.url || null,
          result: 'scheduled',
          recommended_by: 'cap'
        })
      });
    }

    const idx = _ceoItems.findIndex(i => i.id === uuid);
    if (idx >= 0) _ceoItems[idx].ceo_decision = 'OK';
    _bidLoaded = false;
    _ceoUpdateKpi();
    renderCeoFiltered();
  } catch(e) {
    console.error(e); btn.disabled = false; btn.textContent = 'OK';
    alert('保存エラー: ' + e.message);
  }
}

async function doCeoHold(uuid, safeId, btn) {
  btn.disabled = true; btn.textContent = '保存中...';

      method: 'PATCH',

async function doCeoNG(uuid, safeId, btn) {
  btn.disabled = true; btn.textContent = '保存中...';
  const reason_code = document.getElementById(`ng-code-${safeId}`)?.value || null;
  const reason_text = (document.getElementById(`ng-text-${safeId}`)?.value || '').trim() || null;
  try {
    const r = await fetch(`${SB_URL}/rest/v1/ceo_review_log?id=eq.${encodeURIComponent(uuid)}`, {
      method: 'PATCH',
      headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ ceo_decision: 'NG', reason_code: reason_code || null, reason_text: reason_text || null, reviewed_at: new Date().toISOString(), reviewed_by: 'CEO' })
    });
    if (!r.ok) throw new Error(`PATCH ceo_review_log: ${r.status}`);
    const idx = _ceoItems.findIndex(i => i.id === uuid);
    if (idx >= 0) { _ceoItems[idx].ceo_decision = 'NG'; _ceoItems[idx].reason_code = reason_code; _ceoItems[idx].reason_text = reason_text; }
    _ceoUpdateKpi();
    renderCeoFiltered();
  } catch(e) {
    console.error(e); btn.disabled = false; btn.textContent = 'NGとして確定する';
    alert('保存エラー: ' + e.message);
  }
}

/* 旧関数名互換 */
function doCeoApprove(key, btn) { return doCeoOK(key, key.replace(/-/g,'_'), btn); }

function _ceoUpdateKpi() {
  const items    = _ceoItems;
  const pending  = items.filter(i => !i.ceo_decision && i.duplicate_status !== 'DUPLICATE_BLOCKED').length;
  const ok       = items.filter(i => i.ceo_decision === 'OK').length;
  const ng       = items.filter(i => i.ceo_decision === 'NG').length;
  const hold     = items.filter(i => i.ceo_decision === 'HOLD').length;
  const blocked  = items.filter(i => i.duplicate_status === 'DUPLICATE_BLOCKED').length;
  const resub    = items.filter(i => i.duplicate_status === 'RESUBMITTED' && !i.ceo_decision).length;
  document.getElementById('ceo-kpi-pending').textContent  = pending;
  document.getElementById('ceo-kpi-ok').textContent       = ok;
  document.getElementById('ceo-kpi-ng').textContent       = ng;
  document.getElementById('ceo-kpi-hold').textContent     = hold;
  document.getElementById('ceo-kpi-blocked').textContent  = blocked;
  document.getElementById('ceo-kpi-resub').textContent    = resub;
  const badge = document.getElementById('ceo-count-badge');
  badge.textContent = pending; badge.style.display = pending > 0 ? '' : 'none';
}

  /* [D] ヤフオク履歴: URLあり案件のみ表示（NGルール: URLなし=参考データ扱い・CEO判断不可） */

/* =====================================================
   入札予定パネル
   ===================================================== */
async function loadBidPanel() {
  document.getElementById('bid-list').innerHTML = '<div class="loading-state">読み込み中...</div>';
  try {
    const cols = 'id,lot_title,auction_house,lot_url,auction_end_at,our_bid_usd,our_bid_jpy,result,final_price_usd,final_price_jpy,notes,screenshot_path';
    const resp = await fetch(
      `${SB_URL}/rest/v1/bid_history?order=auction_end_at.asc.nullslast,created_at.desc&limit=100&select=${cols}`,
      { headers: SB_HDR }
    );
    const items = await resp.json();
    if (!Array.isArray(items)) throw new Error('Invalid response');

    /* KPI */
    const scheduled = items.filter(i => i.result === 'scheduled');
    const wins      = items.filter(i => i.result === 'win');
    const loses     = items.filter(i => i.result === 'lose');
    document.getElementById('bid-kpi-scheduled').textContent = scheduled.length;
    document.getElementById('bid-kpi-win').textContent       = wins.length;
    document.getElementById('bid-kpi-lose').textContent      = loses.length;

    /* 緊急カウント (scheduled + 締切48h以内) */
    const now = new Date();
    const urgentIds = new Set(scheduled.filter(i => i.auction_end_at && (new Date(i.auction_end_at) - now) < 172800000).map(i => i.id));
    const urgCnt = urgentIds.size;
    document.getElementById('bid-urgent-count').textContent = urgCnt;
    document.getElementById('bid-urgent-header').style.display = urgCnt > 0 ? '' : 'none';
    const urgBadge = document.getElementById('bid-urgent-badge');
    urgBadge.textContent = urgCnt; urgBadge.style.display = urgCnt > 0 ? '' : 'none';

    const list = document.getElementById('bid-list');
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state">入札予定はありません。<br>CEO確認タブで案件を承認すると自動追加されます。</div>';
      return;
    }

    /* 表示順: 緊急→予定残り→落札→落選→その他 */
    const sorted = [
      ...items.filter(i => urgentIds.has(i.id)),
      ...scheduled.filter(i => !urgentIds.has(i.id)),
      ...wins,
      ...loses,
      ...items.filter(i => !['scheduled','win','lose'].includes(i.result))
    ];
    list.innerHTML = sorted.map(item => renderBidCard(item)).join('');
  } catch(e) {
    console.error(e);
    document.getElementById('bid-list').innerHTML = '<div class="empty-state" style="color:#f87171;">読み込みエラー。ページを更新してください。</div>';
  }
}

function renderBidCard(item) {
  const result = item.result || 'scheduled';
  const LABELS = { scheduled:'⏳ 予定', win:'🏆 落札', lose:'❌ 落選', cancelled:'キャンセル' };
  const CLASSES = { scheduled:'r-scheduled', win:'r-win', lose:'r-lose', cancelled:'r-cancelled' };
  const resLabel = LABELS[result] || result;
  const resClass = CLASSES[result] || 'r-scheduled';

  const now = new Date();
  let urgentDot = '';
  let metaParts = [escH(item.auction_house || '')];
  if (item.auction_end_at) {
    const dt = new Date(item.auction_end_at);
    const diffH = (dt - now) / 3600000;
    const ds = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    if (diffH < 48 && result === 'scheduled') urgentDot = '<span class="urgent-dot">🚨 </span>';
    metaParts.push('締切: ' + ds);
  }

  const bidDisplay = item.our_bid_usd
    ? `<div class="bid-amount-disp">$${Number(item.our_bid_usd).toFixed(0)}<span style="font-size:11px;color:#888;"> (¥${Number(item.our_bid_jpy||0).toLocaleString('ja-JP')})</span></div>`
    : '<div class="bid-amount-null">入札額未登録</div>';

  const id = escH(item.id);
  const title = escH(item.lot_title || '（タイトルなし）');

  /* 落札額フィールド (予定・落札時のみ表示) */
  const finalRow = (result !== 'lose' && result !== 'cancelled') ? `
    <div class="form-row">
      <span class="form-lbl">落札額 (USD)</span>
      <input class="form-input" type="number" id="bf-final-${id}" value="${escH(item.final_price_usd||'')}" placeholder="落札確定後に入力" step="0.01">
    </div>` : '';

  /* スクリーンショット表示 */
  const ssPath = item.screenshot_path || '';
  const ssInner = ssPath
    ? `<img class="preview-img" id="dz-img-${id}" src="${escH(ssPath)}" onerror="this.style.display='none'">`
    : `<span id="dz-label-${id}">📎 スクリーンショットをD&Dまたはクリックして追加</span>`;

  return `<div class="bid-card" id="bid-card-${id}">
  <div class="bid-card-top" onclick="this.closest('.bid-card').classList.toggle('open')">
    <div class="bid-card-left">
      <div class="bid-card-title">${urgentDot}${title}</div>
      <div class="bid-card-meta">${metaParts.filter(Boolean).join(' | ')}</div>
    </div>
    <div class="bid-card-right">
      ${bidDisplay}
      <span class="result-badge ${resClass}">${resLabel}</span>
    </div>
  </div>
  <div class="bid-detail">
    <div class="section-lbl" style="margin-top:0">▼ 💰 入札額を登録 / 結果更新</div>
    <div class="form-row">
      <span class="form-lbl">入札額 (USD)</span>
      <input class="form-input" type="number" id="bf-usd-${id}" value="${escH(item.our_bid_usd||'')}" placeholder="例: 650" step="0.01" oninput="autoCalcJpy('bf-usd-${id}','bf-jpy-${id}')">
      <span class="jpy-hint" id="bf-jpy-${id}">${item.our_bid_jpy ? '¥'+Number(item.our_bid_jpy).toLocaleString('ja-JP') : '¥ -'}</span>
    </div>
    <div class="form-row">
      <span class="form-lbl">結果</span>
      <select class="form-select" id="bf-result-${id}">
        <option value="scheduled" ${result==='scheduled'?'selected':''}>⏳ 予定</option>
        <option value="win"       ${result==='win'      ?'selected':''}>🏆 落札</option>
        <option value="lose"      ${result==='lose'     ?'selected':''}>❌ 落選</option>
        <option value="cancelled" ${result==='cancelled'?'selected':''}>キャンセル</option>
      </select>
    </div>
    ${finalRow}
    <div class="form-row">
      <span class="form-lbl">備考</span>
      <input class="form-input" type="text" id="bf-notes-${id}" value="${escH(item.notes||'')}" placeholder="メモ">
    </div>
    <div class="drop-zone" id="dz-${id}"
      ondragover="dzOver(event,'${id}')" ondragleave="dzLeave('${id}')" ondrop="dzDrop(event,'${id}')"
      onclick="document.getElementById('dz-file-${id}').click()">
      ${ssInner}
    </div>
    <input type="file" id="dz-file-${id}" accept="image/*" style="display:none" onchange="dzChange(event,'${id}')">
    <button class="btn-save-bid" onclick="event.stopPropagation(); saveBidCard('${id}', this)">💾 保存</button>
    ${item.lot_url ? `<div style="margin-top:8px;"><a class="lot-link" href="${escH(item.lot_url)}" target="_blank" onclick="event.stopPropagation()">🔗 オークションで見る</a></div>` : ''}
  </div>
</div>`;
}

/* ===== ドラッグ&ドロップ / ファイル選択 ===== */
const _ssFiles = {}; // id -> File

function dzOver(e, id)  { e.preventDefault(); document.getElementById(`dz-${id}`).classList.add('dragover'); }
function dzLeave(id)    { document.getElementById(`dz-${id}`).classList.remove('dragover'); }
function dzDrop(e, id)  { e.preventDefault(); dzLeave(id); const f = e.dataTransfer.files[0]; if (f?.type.startsWith('image/')) dzPreview(id, f); }
function dzChange(e,id) { const f = e.target.files[0]; if (f) dzPreview(id, f); }

function dzPreview(id, file) {
  _ssFiles[id] = file;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById(`dz-${id}`).innerHTML =
      `<img class="preview-img" id="dz-img-${id}" src="${ev.target.result}"><br><span style="font-size:10px;color:#888;">${escH(file.name)}</span>`;
  };
  reader.readAsDataURL(file);
}

/* ===== 保存: 既存入札カード ===== */
async function saveBidCard(id, btn) {
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    const rate = getUsdRate();
    const usdVal   = parseFloat(document.getElementById(`bf-usd-${id}`)?.value || 0) || null;
    const resultVal = document.getElementById(`bf-result-${id}`)?.value || 'scheduled';
    const notesVal  = document.getElementById(`bf-notes-${id}`)?.value.trim() || null;
    const finalUsd  = parseFloat(document.getElementById(`bf-final-${id}`)?.value || 0) || null;

    let ssPath = null;
    if (_ssFiles[id]) ssPath = await uploadScreenshot(_ssFiles[id], id);

    const payload = {
      our_bid_usd: usdVal,
      our_bid_jpy: usdVal ? Math.round(usdVal * rate) : null,
      result: resultVal,
      notes: notesVal,
      usd_jpy_rate: usdVal ? rate : null,
      updated_at: new Date().toISOString()
    };
    if (finalUsd !== null) { payload.final_price_usd = finalUsd; payload.final_price_jpy = Math.round(finalUsd * rate); }
    if (ssPath) payload.screenshot_path = ssPath;

    const r = await fetch(`${SB_URL}/rest/v1/bid_history?id=eq.${id}`, {
      method: 'PATCH', headers: { ...SB_HDR, 'Prefer': 'return=minimal' }, body: JSON.stringify(payload)
    });
    if (!r.ok) throw new Error(`PATCH bid_history: ${r.status}`);

    btn.textContent = '✅ 保存しました';
    setTimeout(() => { btn.disabled = false; btn.textContent = '💾 保存'; _bidLoaded = false; }, 2000);
  } catch(e) {
    console.error(e); btn.disabled = false; btn.textContent = '💾 保存';
    alert('保存エラー: ' + e.message);
  }
}

function toggleNewBidForm() {
  const f = document.getElementById('newBidForm');

async function saveNewBid(btn) {
  const title = document.getElementById('nb-title')?.value.trim();
  if (!title) { alert('コイン名を入力してください'); return; }
  btn.disabled = true; btn.textContent = '登録中...';
  try {
    const rate   = getUsdRate();
    const house  = document.getElementById('nb-house')?.value || 'eBay';
    const url    = document.getElementById('nb-url')?.value.trim() || null;
    const endAt  = document.getElementById('nb-end')?.value || null;
    const usd    = parseFloat(document.getElementById('nb-usd')?.value || 0) || null;

    const r = await fetch(`${SB_URL}/rest/v1/bid_history`, {
      method: 'POST',
      headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        lot_title: title, auction_house: house, lot_url: url,
        auction_end_at: endAt ? new Date(endAt).toISOString() : null,
        our_bid_usd: usd, our_bid_jpy: usd ? Math.round(usd * rate) : null,
        usd_jpy_rate: usd ? rate : null, result: 'scheduled', recommended_by: 'manual'
      })
    });
    if (!r.ok) throw new Error(`POST bid_history: ${r.status}`);

    btn.textContent = '✅ 登録しました';
    ['nb-title','nb-url','nb-usd'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });

      btn.disabled = false; btn.textContent = '💾 登録する';

    }, 1500);
  } catch(e) {
    console.error(e); btn.disabled = false; btn.textContent = '💾 登録する';
    alert('登録エラー: ' + e.message);
  }
}

/* ===== スクリーンショット Supabase Storage アップロード ===== */
async function uploadScreenshot(file, bidId) {
  try {
    const ext = file.name.split('.').pop() || 'png';
    const filename = `${bidId}_${Date.now()}.${ext}`;
    const r = await fetch(`${SB_URL}/storage/v1/object/bid-screenshots/${filename}`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': file.type },
      body: file
    });
    if (r.ok) return `${SB_URL}/storage/v1/object/public/bid-screenshots/${filename}`;
    console.warn('Screenshot upload failed:', r.status);
  } catch(e) { console.warn('Screenshot upload error:', e); }
  return null;
}

async function loadMktPanel(reset) {
  if (reset) _mktLoaded = true;
  document.getElementById('mkt-list').innerHTML = '<div class="loading-state">読み込み中...</div>';
  try {
    const hdr = { ...SB_HDR, 'Prefer': 'count=exact' };
    const cnt = async (filter) => {
      const r = await fetch(`${SB_URL}/rest/v1/ceo_review_log?${filter}&select=id&limit=1`, { headers: hdr });
      const cr = r.headers.get('content-range');
      return cr ? parseInt(cr.split('/')[1] || 0) : 0;
    };
    const [rCnt, aCnt, rtCnt] = await Promise.all([
      cnt('marketing_status=eq.MARKETING_REVIEW'),
      cnt('marketing_status=eq.MARKETING_APPROVED'),
      cnt('marketing_status=eq.MARKETING_RETURNED'),
    ]);
    document.getElementById('mkt-kpi-review').textContent   = rCnt;
    document.getElementById('mkt-kpi-approved').textContent = aCnt;
    document.getElementById('mkt-kpi-returned').textContent = rtCnt;
    const badge = document.getElementById('mkt-count-badge');
    badge.textContent = rCnt; badge.style.display = rCnt > 0 ? '' : 'none';
  } catch(e) { console.error('Mkt KPI:', e); }

  try {
    const cols = 'id,source_group,auction_house,url,title_snapshot,cert_company,cert_number,grade,country,year,denomination,material,price_snapshot_usd,price_snapshot_jpy,snapshot_score,review_bucket,ceo_decision,comparison_type,yahoo_ref_title,yahoo_ref_price_jpy,yahoo_ref_date,yahoo_ref_grade,cap_bid_limit_jpy,cap_bid_limit_usd,estimated_sell_price_jpy,expected_profit_jpy,expected_roi_pct,cap_judgment,cap_comment,image_url,evidence_status,category,marketing_status,marketing_comment';
    const resp = await fetch(
      `${SB_URL}/rest/v1/ceo_review_log?select=${cols}&limit=500&order=snapshot_score.desc`,
      { headers: SB_HDR }
    );
    _mktItems = await resp.json();
    if (!Array.isArray(_mktItems)) _mktItems = [];
    renderMktFiltered();
  } catch(e) {
    console.error('Mkt list:', e);
    document.getElementById('mkt-list').innerHTML = '<div class="empty-state" style="color:#f87171;">読み込みエラー</div>';
  }
}

function renderMktFiltered() {
  let items = [..._mktItems];
  if (_mktStatusFilter !== 'all') {
    items = items.filter(i => i.marketing_status === _mktStatusFilter);
  }
  if (_mktSourceFilter !== 'all') {
    items = items.filter(i => (i.source_group || 'EBAY') === _mktSourceFilter);
  }
  const list = document.getElementById('mkt-list');
  if (!items.length) {
    list.innerHTML = '<div class="empty-state">該当案件はありません</div>';
    return;
  }
  list.innerHTML = `<div style="font-size:11px;color:#888;margin-bottom:6px;">${items.length}件</div>` +
    items.map((item, idx) => renderMktCard(item, idx + 1)).join('');
}

function renderMktCard(item, rank) {
  const uuid   = item.id || '';
  const safeId = uuid.replace(/-/g, '_');
  const srcGrp = item.source_group || 'EBAY';
  const aHouse = item.auction_house || 'EBAY';
  const title  = escH(item.title_snapshot || '（タイトルなし）');
  const score  = item.snapshot_score;
  const bucket = item.review_bucket || '';
  const capJ   = item.cap_judgment || '';
  const ms     = item.marketing_status || '';

  const capJBadge = capJ === 'CAP_BUY'
    ? `<span style="font-size:11px;padding:2px 7px;border-radius:10px;background:#052e16;color:#4ade80;border:1px solid #4ade80;font-weight:bold;">&#9989; CAP_BUY</span>`
    : capJ === 'CAP_HOLD'
    ? `<span style="font-size:11px;padding:2px 7px;border-radius:10px;background:#422006;color:#fbbf24;border:1px solid #d97706;font-weight:bold;">&#9208; CAP_HOLD</span>`
    : capJ === 'CAP_NG'
    ? `<span style="font-size:11px;padding:2px 7px;border-radius:10px;background:#450a0a;color:#f87171;border:1px solid #f87171;font-weight:bold;">&#10060; CAP_NG</span>`
    : '';
  const msBadge = ms === 'MARKETING_REVIEW'
    ? `<span style="font-size:10px;padding:2px 7px;border-radius:8px;background:#422006;color:#fbbf24;">確認待ち</span>`
    : ms === 'MARKETING_APPROVED'
    ? `<span style="font-size:10px;padding:2px 7px;border-radius:8px;background:#052e16;color:#4ade80;">承認済</span>`
    : ms === 'MARKETING_RETURNED'
    ? `<span style="font-size:10px;padding:2px 7px;border-radius:8px;background:#450a0a;color:#f87171;">差し戻し</span>`
    : `<span style="font-size:10px;color:#666;">${escH(ms)}</span>`;

  const houseBadge = srcGrp === 'WORLD'
    ? `<span style="font-size:11px;padding:2px 7px;border-radius:10px;background:#0c1a2e;color:#93c5fd;border:1px solid #1d4ed8;">&#127758; ${escH(HOUSE_LABEL[aHouse]||aHouse)}</span>`
    : '';
  const bucketBadge = bucket ? `<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:#1e1e2e;color:#9ca3af;border:1px solid #4b5563;">${escH(bucket)}</span>` : '';

  // Yahoo ref
  const yahooHtml = item.yahoo_ref_price_jpy
    ? `<div style="background:#0a1e30;border:1px solid #1e3a5f;border-radius:6px;padding:6px 10px;margin:5px 0;font-size:11px;">
        <span style="color:#60a5fa;font-weight:bold;">Yahoo参照 (${escH(item.comparison_type||'')})</span>
        <span style="color:#4ade80;font-weight:bold;margin-left:8px;">&#xA5;${Number(item.yahoo_ref_price_jpy).toLocaleString('ja-JP')}</span>
        <span style="color:#888;margin-left:6px;">${escH(item.yahoo_ref_date||'')} ${escH(item.yahoo_ref_grade||'')}</span>
        <div style="color:#94a3b8;margin-top:2px;">${escH((item.yahoo_ref_title||'').slice(0,55))}${(item.yahoo_ref_title||'').length>55?'...':''}</div>
      </div>`
    : `<div style="background:#1a0a0a;border:1px solid #7f1d1d;border-radius:6px;padding:5px 10px;margin:4px 0;font-size:11px;color:#f87171;">&#x26A0; Yahoo参照なし</div>`;

  // Profit grid
  const capLimit = item.cap_bid_limit_jpy ? `&#xA5;${Number(item.cap_bid_limit_jpy).toLocaleString('ja-JP')}` + (item.cap_bid_limit_usd ? ` ($${Number(item.cap_bid_limit_usd).toFixed(0)})` : '') : '--';
  const profit   = item.expected_profit_jpy;
  const profitStr = profit != null
    ? `<span style="color:${profit >= 20000 ? '#4ade80' : profit > 0 ? '#fbbf24' : '#f87171'};font-weight:bold;">&#xA5;${Number(profit).toLocaleString('ja-JP')}</span>`
    : '--';
  const roi = item.expected_roi_pct != null ? `ROI ${Number(item.expected_roi_pct).toFixed(1)}%` : '';
  const profitGrid = `<div class="ceo-price-grid">
    <div class="ceo-pc"><div class="c-lbl">仕入上限</div><div class="c-val" style="font-size:12px;">${capLimit}</div></div>
    <div class="ceo-pc"><div class="c-lbl">想定売価</div><div class="c-val vb" style="font-size:12px;">${item.estimated_sell_price_jpy ? `&#xA5;${Number(item.estimated_sell_price_jpy).toLocaleString('ja-JP')}` : '--'}</div></div>
    <div class="ceo-pc"><div class="c-lbl">想定利益</div><div class="c-val">${profitStr}<br><span style="font-size:10px;color:#888;">${roi}</span></div></div>
  </div>`;

  // CAP comment
  const capComHtml = item.cap_comment ? `<div style="background:#1e293b;border-radius:6px;padding:8px;margin:5px 0;font-size:11px;color:#cbd5e1;line-height:1.6;white-space:pre-wrap;word-break:break-all;">&#x1F4AC; ${escH(item.cap_comment)}</div>` : '';

  // Coin image thumbnail (all sources)
  const imgHtml = item.image_url
    ? `<div style="margin:5px 0;display:flex;align-items:center;gap:10px;">
        <img src="${escH(item.image_url)}" alt="coin"
          style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid #2a2a4a;background:#111;"
          onerror="this.style.display='none'">
        <div>
          <a href="${escH(item.image_url)}" target="_blank" onclick="event.stopPropagation()"
            style="display:inline-block;padding:4px 10px;background:#1c3a1c;border:1px solid #4ade80;border-radius:6px;color:#4ade80;text-decoration:none;font-size:12px;">&#x1F5BC; 画像確認</a>
          <div style="font-size:10px;color:#888;margin-top:3px;">${escH(item.evidence_status||'')}</div>
        </div>
      </div>`
    : (srcGrp === 'WORLD'
        ? `<div style="background:#1a1000;border:1px solid #f59e0b;border-radius:6px;padding:5px 10px;margin:4px 0;font-size:11px;color:#f59e0b;">&#x26A0; 画像導線なし — 差し戻し条件</div>`
        : '');

  // URL link
  const urlHtml = item.url ? `<a class="lot-link" href="${escH(item.url)}" target="_blank" onclick="event.stopPropagation()">&#x1F517; 商品を見る</a><br>` : '';

  // Marketing action
  let mktActionHtml = '';
  if (ms === 'MARKETING_REVIEW') {
    mktActionHtml = `
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button style="flex:1;padding:11px;border:none;border-radius:8px;background:#ffd700;color:#000;font-size:13px;font-weight:bold;cursor:pointer;"
        onclick="event.stopPropagation();doMktApprove('${uuid}','${safeId}',this)">&#9989; 承認→CEO確認へ</button>
      <button style="flex:1;padding:11px;border:1px solid #7f1d1d;border-radius:8px;background:#1e1010;color:#fca5a5;font-size:13px;font-weight:bold;cursor:pointer;"
        onclick="event.stopPropagation();toggleMktReturnArea('${safeId}')">&#10060; 差し戻す</button>
    </div>
    <div id="mkt-return-${safeId}" style="display:none;margin-top:6px;">
      <textarea id="mkt-rtext-${safeId}" placeholder="差し戻し理由（必須）" rows="3"
        style="width:100%;padding:8px;border:1px solid #444;border-radius:6px;background:#1e293b;color:#fff;font-size:12px;resize:vertical;"></textarea>
      <button style="width:100%;margin-top:5px;padding:10px;border:none;border-radius:6px;background:#7f1d1d;color:#fca5a5;font-weight:bold;font-size:13px;cursor:pointer;"
        onclick="event.stopPropagation();doMktReturn('${uuid}','${safeId}',this)">差し戻し確定</button>
    </div>`;
  } else if (ms === 'MARKETING_APPROVED') {
    mktActionHtml = `<div style="padding:8px;background:#0a1a0a;border-radius:6px;font-size:12px;color:#4ade80;text-align:center;">&#9989; 承認済 — CEO確認タブへ転送済み</div>`;
  } else if (ms === 'MARKETING_RETURNED') {
    mktActionHtml = `
    <div style="background:#1a0a0a;border-radius:6px;padding:8px;font-size:12px;color:#f87171;margin-top:6px;">&#10060; 差し戻し済み${item.marketing_comment ? `<br><span style="color:#fca5a5;">${escH(item.marketing_comment)}</span>` : ''}</div>
    <button style="width:100%;margin-top:6px;padding:10px;border:1px solid #4ade80;border-radius:6px;background:#0a1a0a;color:#4ade80;font-size:12px;cursor:pointer;"
      onclick="event.stopPropagation();doMktApprove('${uuid}','${safeId}',this)">&#9989; 再承認→CEO確認へ</button>`;
  }

  // Header thumbnail + quick summary
  const thumbHtml = item.image_url
    ? `<img src="${escH(item.image_url)}" alt="coin"
        style="width:52px;height:52px;object-fit:cover;border-radius:6px;border:1px solid #2a2a4a;background:#111;flex-shrink:0;"
        onerror="this.style.display='none'">`
    : `<div style="width:52px;height:52px;border-radius:6px;background:#1e1e2e;border:1px solid #333;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;">&#x1FA99;</div>`;

  const quickProfit = item.expected_profit_jpy != null
    ? `<span style="font-size:11px;font-weight:bold;color:${item.expected_profit_jpy>=20000?'#4ade80':item.expected_profit_jpy>0?'#fbbf24':'#f87171'};">
        &#xA5;${Number(item.expected_profit_jpy).toLocaleString('ja-JP')}
       </span>`
    : '';
  const quickLimit = item.cap_bid_limit_usd
    ? `<span style="font-size:10px;color:#94a3b8;">上限$${Number(item.cap_bid_limit_usd).toFixed(0)}</span>`
    : '';

  return `<div class="cand-card" id="mkt-${safeId}" style="border-color:${ms==='MARKETING_APPROVED'?'#166534':ms==='MARKETING_RETURNED'?'#7f1d1d':'#2a2a4a'};">
  <div class="cand-top" onclick="this.closest('.cand-card').classList.toggle('open')">
    <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:5px;">
      ${thumbHtml}
      <div style="flex:1;min-width:0;">
        <div class="cand-row" style="margin-bottom:4px;flex-wrap:wrap;">
          ${bucketBadge} ${houseBadge} <span style="font-size:11px;color:#6b7280;">#${rank}</span>
          <span style="font-size:11px;color:#888;">Sc:${score||'?'}</span>
          ${capJBadge} ${msBadge}
        </div>
        <div class="cand-title" style="font-size:12px;">${title}</div>
        <div style="margin-top:3px;display:flex;gap:8px;align-items:center;">${quickProfit} ${quickLimit}</div>
        ${urlHtml}
      </div>
    </div>
    <button class="reason-toggle" onclick="event.stopPropagation();this.closest('.cand-card').classList.toggle('open')">&#x25B6; CAP分析・審査操作を見る</button>
  </div>
  <div class="cand-detail">
    ${yahooHtml}
    ${capComHtml}
    ${imgHtml}
    ${profitGrid}
    ${mktActionHtml}
  </div>
</div>`;
}

function toggleMktReturnArea(safeId) {
  const el = document.getElementById(`mkt-return-${safeId}`);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

async function doMktApprove(uuid, safeId, btn) {
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    const r = await fetch(`${SB_URL}/rest/v1/ceo_review_log?id=eq.${encodeURIComponent(uuid)}`, {
      method: 'PATCH',
      headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        marketing_status: 'MARKETING_APPROVED',
        marketing_reviewed_at: new Date().toISOString(),
        marketing_reviewed_by: 'marketing',
        updated_at: new Date().toISOString()
      })
    });
    if (!r.ok) throw new Error(`PATCH: ${r.status}`);
    const idx = _mktItems.findIndex(i => i.id === uuid);
    if (idx >= 0) _mktItems[idx].marketing_status = 'MARKETING_APPROVED';
    _mktLoaded = false; // force CEO tab reload
    _ceoItems  = [];
    renderMktFiltered();
    // update KPI badges
    const cnt = _mktItems.filter(i => i.marketing_status === 'MARKETING_REVIEW').length;
    const badge = document.getElementById('mkt-count-badge');
    badge.textContent = cnt; badge.style.display = cnt > 0 ? '' : 'none';
    document.getElementById('mkt-kpi-review').textContent = cnt;
  } catch(e) {
    console.error(e); btn.disabled = false; btn.textContent = '&#9989; 承認→CEO確認へ';
    alert('保存エラー: ' + e.message);
  }
}

async function doMktReturn(uuid, safeId, btn) {
  const comment = document.getElementById(`mkt-rtext-${safeId}`)?.value.trim();
  if (!comment) { alert('差し戻し理由を入力してください'); return; }
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    const r = await fetch(`${SB_URL}/rest/v1/ceo_review_log?id=eq.${encodeURIComponent(uuid)}`, {
      method: 'PATCH',
      headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        marketing_status: 'MARKETING_RETURNED',
        marketing_comment: comment,
        marketing_reviewed_at: new Date().toISOString(),
        marketing_reviewed_by: 'marketing',
        updated_at: new Date().toISOString()
      })
    });
    if (!r.ok) throw new Error(`PATCH: ${r.status}`);
    const idx = _mktItems.findIndex(i => i.id === uuid);
    if (idx >= 0) { _mktItems[idx].marketing_status = 'MARKETING_RETURNED'; _mktItems[idx].marketing_comment = comment; }
    renderMktFiltered();
  } catch(e) {
    console.error(e); btn.disabled = false; btn.textContent = '差し戻し確定';
    alert('保存エラー: ' + e.message);
  }
}

/* ===== 初期化 ===== */
loadData();         // 相場DBデータ（バックグラウンド）
loadCeoPanel(0);    // CEO確認データ（デフォルトタブ）
</script>
